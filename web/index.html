<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小初·看盘训练场</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; margin:0; background:#0f1220; color:#e8ebff; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; }
    .card { background:#171b2e; border-radius:14px; padding:16px; margin-bottom:14px; }
    button { background:#7c8dff; color:#fff; border:0; border-radius:10px; padding:10px 14px; cursor:pointer; }
    select { padding:8px; border-radius:8px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .muted { color:#aab2d7; }
    .score { font-size:24px; font-weight:700; }
    .ghost { background:#2b345d; }
    pre { white-space: pre-wrap; background:#10152b; border-radius:10px; padding:12px; }
  </style>
</head>
<body>
<div class="wrap">
  <h2>📈 小初 · 看盘训练场</h2>
  <p class="muted">目标：用真实历史K线做训练，提高你对趋势和短期方向的敏感度。</p>

  <div class="card">
    <div class="row">
      <label>难度：</label>
      <select id="level">
        <option value="easy">初级（更多上下文，预测5日）</option>
        <option value="normal" selected>中级（标准）</option>
        <option value="hard">实战（更少上下文，预测10日）</option>
      </select>
      <button onclick="newChallenge()">来一题</button>
      <span id="meta"></span>
      <span>累计得分：<b id="total">0</b></span>
      <span>连胜：<b id="streak">0</b></span>
    </div>
  </div>

  <div class="card"><div id="kline" style="height:520px;"></div></div>
  <div class="card" id="eventsBox"><div class="muted">事件上下文加载中...</div></div>

  <div class="card row">
    <label>未来方向：</label>
    <select id="predDirection"><option>上涨</option><option>下跌</option></select>

    <label>当前趋势：</label>
    <select id="predTrend"><option>上涨</option><option>下跌</option><option>震荡</option></select>

    <button onclick="submitAnswer()">提交判断</button>
    <button class="ghost" onclick="runCodexReplay()">用 Codex 深度复盘</button>
  </div>

  <div class="card" id="result">等你来判断。</div>
  <div class="card" id="codexBox" style="display:none;"><pre id="codexText"></pre></div>
</div>

<script>
let currentId = null;
let lastReviewId = null;
let total = 0;
let streak = 0;

async function newChallenge() {
  const level = document.getElementById('level').value;
  const r = await fetch('/api/challenge?level=' + encodeURIComponent(level));
  const d = await r.json();
  if (d.error) return alert(d.error);
  currentId = d.id;
  lastReviewId = null;
  document.getElementById('codexBox').style.display = 'none';
  document.getElementById('meta').innerText = `标的 ${d.symbol} · 截面日期 ${d.anchor_date} · 预测${d.pred_days}日`;
  document.getElementById('result').innerText = d.prompt;

  const events = d.events || [];
  const eventsHtml = events.length
    ? `<b>近期重大事件（复盘参考）</b><ul>${events.map(e => `<li>${e.time}｜${e.title}（${e.source}）</li>`).join('')}</ul>`
    : '<span class="muted">暂无可用事件数据</span>';
  document.getElementById('eventsBox').innerHTML = eventsHtml;

  const x = d.candles.map(i => i.date);
  const trace = {
    x,
    open: d.candles.map(i => i.open),
    high: d.candles.map(i => i.high),
    low: d.candles.map(i => i.low),
    close: d.candles.map(i => i.close),
    type: 'candlestick',
    increasing: {line: {color: '#ff5d73'}},
    decreasing: {line: {color: '#4ac98a'}}
  };
  Plotly.newPlot('kline', [trace], {paper_bgcolor:'#171b2e', plot_bgcolor:'#171b2e', font:{color:'#e8ebff'}, xaxis:{rangeslider:{visible:false}}});
}

async function submitAnswer() {
  if (!currentId) return alert('先来一题');
  const payload = {
    id: currentId,
    pred_direction: document.getElementById('predDirection').value,
    pred_trend: document.getElementById('predTrend').value
  };
  const r = await fetch('/api/answer', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
  const d = await r.json();
  if (d.error) return alert(d.error);

  lastReviewId = d.review_id;
  total += d.score;
  streak = d.score >= 60 ? streak + 1 : 0;
  document.getElementById('total').innerText = total;
  document.getElementById('streak').innerText = streak;

  document.getElementById('result').innerHTML = `
    <div class="score">本题得分：${d.score}（${d.level}）</div>
    <div>真实结果：${d.truth.symbol}，截面 ${d.truth.anchor_date} 后 <b>${d.truth.direction}</b>（${d.truth.ret5_pct}%），当时趋势 <b>${d.truth.trend}</b></div>
    <div>${d.details.join('；')}</div>
    <div class="muted">小初点评：${d.coach}</div>
  `;
  currentId = null;
}

async function runCodexReplay() {
  if (!lastReviewId) return alert('先提交本题答案，再做深度复盘。');
  document.getElementById('codexBox').style.display = 'block';
  document.getElementById('codexText').innerText = 'Codex 任务已提交，分析中...';

  const r = await fetch('/api/replay/codex', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({review_id:lastReviewId})
  });
  const d = await r.json();
  if (d.error) {
    document.getElementById('codexText').innerText = `调用失败：${d.error}\n${d.detail || ''}`;
    return;
  }

  const jobId = d.job_id;
  let retry = 0;
  const timer = setInterval(async () => {
    retry += 1;
    const s = await fetch(`/api/replay/codex/${jobId}`);
    const j = await s.json();

    if (j.status === 'queued' || j.status === 'running') {
      document.getElementById('codexText').innerText = `Codex 分析中...（${retry * 2}s）`;
      return;
    }

    clearInterval(timer);

    if (j.status === 'error') {
      document.getElementById('codexText').innerText = `调用失败：${j.error || 'unknown'}\n${j.detail || ''}`;
      return;
    }

    document.getElementById('codexText').innerText = `${j.analysis}\n\n[耗时 ${j.elapsed_sec || '-'}s]`;
  }, 2000);
}

newChallenge();
</script>
</body>
</html>
